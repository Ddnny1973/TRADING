services:
  backend-python:
    build:
      context: ./backend-python
      network: host
    container_name: trading-backend
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis-trading
      - POSTGRES_HOST=postgres-trading
      - SQLITE_DATA_DIR=/app/data
    ports:
      - "8043:8000"
    volumes:
      - ./backend-data:/app/data
    depends_on:
      - redis-trading
      - postgres-trading
    networks:
      - default
      - infra_shared
    restart: unless-stopped

  redis-trading:
    image: redis:7-alpine
    container_name: redis-trading
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis-trading-data:/data
    networks:
      - default
    restart: unless-stopped

  postgres-trading:
    image: postgres:15
    container_name: postgres-trading
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "9043:5432"
    volumes:
      - ./postgres-trading-data:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped

networks:
  default:
  infra_shared:
    external: true
