services:
  n8n:
    image: n8nio/n8n
    ports:
      - "8032:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=user
      - N8N_BASIC_AUTH_PASSWORD=Urantia73
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=Urantia73
      - NODE_FUNCTION_ALLOW_EXTERNAL=axios,qs
      
      - N8N_RUNNERS_ENABLED=false
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=false
      

      - ENCRYPTION_KEY=88aKHOg5lkB53zWd8N8Sf2akYiqciBYUeFR7Inp1hhk=

      - N8N_HOST=n8n.gestorconsultoria.com.co
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=https://n8n.gestorconsultoria.com.co/

      # Variables críticas para programación
      - TZ=America/Bogota
      - GENERIC_TIMEZONE=America/Bogota
      - N8N_DEFAULT_LOCALE=es
      - N8N_TIMEZONE=America/Bogota
    
      # Configuración para trabajos programados
      # - EXECUTIONS_MODE=queue
      -  EXECUTIONS_MODE=regular
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=Urantia1973
      - N8N_DIAGNOSTICS_ENABLED=false
      
      # Configuración para mejor rendimiento
      - N8N_PAYLOAD_SIZE_MAX=16
      - N8N_METRICS=true
      - N8N_DISABLE_UI=false


    volumes:
      - ./n8n-data:/home/node/.n8n
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /:/host:ro
      - /var/run/docker.sock:/var/run/docker.sock
    
    depends_on:
      - db
      - redis
      - pgvectordb


    restart: unless-stopped

  redis:
    image: redis:7-alpine
#    ports:
#      - "6379:6379"
    volumes:
      - ./redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass Urantia1973

  db:
    image: postgres:12
    ports:
      - "9032:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=Urantia73
      - POSTGRES_DB=n8n
      - TZ=America/Bogota
      - PGTZ=America/Bogota
    command: postgres -c 'timezone=America/Bogota'
    restart: unless-stopped

  pgvectordb:
    image: pgvector/pgvector:pg14
    ports:
      - "9033:5432"
    volumes:
      - ./pgvector-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=vector
      - POSTGRES_PASSWORD=Urantia73
      - POSTGRES_DB=vector
      - TZ=America/Bogota
      - PGTZ=America/Bogota
    command: postgres -c 'timezone=America/Bogota'
    restart: unless-stopped

  # Servicio de OCR y proceso de embedding
  ocr:
    build:
      context: ./ocr-service
    ports:
      - "5001:5000"
    volumes:
      - ./ocr-service:/app
    restart: unless-stopped

  # 🆕 Servicio de transcripción de audio con Whisper
  transcription:
    build:
      context: ./transcription-service
    container_name: transcription
    ports:
      - "5003:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Montar directorios de media para acceso directo a los archivos de audio
      - ./wppapi-media:/app/wppapi-media:ro
      - ./wppapi-ai-media:/app/wppapi-ai-media:ro
      - ./wppapi-ai-2-media:/app/wppapi-ai-2-media:ro
    restart: unless-stopped


  pdf2img:
    build:
      context: ./pdf2img-service
    ports:
      - "5002:5000"
    restart: unless-stopped

  wppapi:
    build:
      context: ./whatsapp-web-api
    container_name: wppapi
    restart: unless-stopped
    environment:
      - WPP_SESSION_ID=default
      - ENABLE_RECEIVE_MESSAGES=true
      - WEBHOOK_URL=http://n8n:5678/webhook/whatsapp-messages
      - SAVE_MEDIA=true
      - MEDIA_PATH=/app/media
    volumes:
      - ./wppapi_data:/app/.wwebjs_auth
      - ./wppapi-media:/app/media
      - wppapi_tmp:/tmp
    expose:
      - "3000"

  wppapi_mb:
    build:
      context: ./whatsapp-web-api
    container_name: wppapi_mb
    restart: unless-stopped
    environment:
      - WPP_SESSION_ID=mb-asesores
    volumes:
      - ./wppapi_mb_data:/app/.wwebjs_auth
      - ./wppapi-mb-media:/app/media
      - wppapi_mb_tmp:/tmp
    expose:
      - "3000"

  wppapi_ai:
    build:
      context: ./whatsapp-web-api
    container_name: wppapi_ai
    restart: unless-stopped
    environment:
      - WPP_SESSION_ID=ai
      - ENABLE_RECEIVE_MESSAGES=true
      - WEBHOOK_URL=http://n8n:5678/webhook/whatsapp-messages-ai
      - SAVE_MEDIA=true
      - MEDIA_PATH=/app/media
    volumes:
      - ./wppapi_ai_data:/app/.wwebjs_auth
      - ./wppapi-ai-media:/app/media
      - wppapi_ai_tmp:/tmp
    expose:
      - "3000"

  wppapi_ai_2:
    build:
      context: ./whatsapp-web-api
    container_name: wppapi_ai_2
    restart: unless-stopped
    environment:
      - WPP_SESSION_ID=ai_2
      - ENABLE_RECEIVE_MESSAGES=true
      - WEBHOOK_URL=http://n8n:5678/webhook/whatsapp-messages-ai-2
      - SAVE_MEDIA=true
      - MEDIA_PATH=/app/media
    volumes:
      - wppapi_ai_2_data:/app/.wwebjs_auth
      - ./wppapi-ai-2-media:/app/media
      - wppapi_ai_2_tmp:/tmp
    expose:
      - "3000"


volumes:
  db_data:
  pgvector_data:
  redis_data:
  n8n_data:
  wppapi_data:
  wppapi_ai_data:
  wppapi_mb_data:
  wppapi_ai_2_data:
  wppapi_tmp:
  wppapi_mb_tmp:
  wppapi_ai_tmp:
  wppapi_ai_2_tmp:

