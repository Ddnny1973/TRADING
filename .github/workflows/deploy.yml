name: Deploy to Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'n8n-workflows/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 600s
          command_timeout: 600s
          script: |
            set -e
            cd /data/odoo/43

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Rebuilding backend-python (with BuildKit)..."
            export DOCKER_BUILDKIT=1
            docker compose build backend-python

            echo "==> Restarting backend-python only (postgres/redis not touched)..."
            docker compose up -d backend-python

            echo "==> Cleaning dangling images..."
            docker image prune -f

            echo "==> Waiting for backend to become healthy (up to 30s)..."
            for i in $(seq 1 15); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' trading-backend 2>/dev/null || echo "starting")
              echo "  attempt $i: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "  Backend is healthy."
                break
              fi
              if [ "$i" = "15" ]; then
                echo "  ERROR: backend did not become healthy after 30s"
                docker logs trading-backend --tail 30
                exit 1
              fi
              sleep 2
            done

            echo "==> Status:"
            docker compose ps